<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RR Smaller Artists Instagram tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#e0e0e0;min-height:100vh}

.header{background:#111;border-bottom:1px solid #222;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{height:42px;width:auto;display:block;flex-shrink:0}
.header-left h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.header-left h1 em{font-style:normal;color:#9BFF06}
.week-tab.active{color:#0d0d0d !important}
.week-tabs{display:flex;gap:6px;flex-wrap:wrap}
.week-tab{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .15s}
.week-tab:hover{border-color:#444;color:#ccc}
.week-tab.active{background:#9BFF06;border-color:#9BFF06;color:#fff;font-weight:600}
.week-date{font-size:11px;color:#555;margin-top:4px}

.container{padding:20px 28px;max-width:1400px;margin:0 auto}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px 16px}
.kpi .v{font-size:26px;font-weight:700;color:#9BFF06;line-height:1}
.kpi .l{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-top:5px}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.toolbar input[type=text],.toolbar select{background:#111;border:1px solid #1e1e1e;border-radius:8px;color:#e0e0e0;padding:8px 12px;font-size:13px;font-family:inherit}
.toolbar input[type=text]{flex:1;min-width:200px}
.toolbar input[type=text]:focus,.toolbar select:focus{outline:none;border-color:#9BFF06}
.btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#ccc;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.btn:hover{border-color:#444;color:#fff}
.btn.primary{background:#9BFF06;border-color:#9BFF06;color:#0d0d0d}
.btn.primary:hover{background:#82d904;border-color:#82d904}
.btn.danger{color:#ff5252}
.btn.danger:hover{border-color:#ff5252;color:#ff5252}

.panel{background:#111;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden;margin-bottom:20px}
.panel-head{padding:12px 16px;border-bottom:1px solid #1e1e1e;font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center}

.growth-list{padding:8px 0;max-height:340px;overflow-y:auto}
.growth-row{display:flex;align-items:center;padding:7px 16px;gap:10px;transition:background .1s}
.growth-row:hover{background:#161616}
.growth-rank{font-size:11px;color:#444;width:20px;flex-shrink:0;text-align:right}
.growth-name{font-size:13px;color:#ccc;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.growth-followers{font-size:12px;color:#666;margin-right:4px;min-width:60px;text-align:right}
.growth-delta{font-size:12px;font-weight:600;min-width:54px;text-align:right;flex-shrink:0}
.delta-pos{color:#69f0ae}
.delta-neg{color:#ff5252}
.delta-neu{color:#555}
.delta-bar-wrap{width:60px;height:4px;background:#1e1e1e;border-radius:2px;flex-shrink:0;overflow:hidden}
.delta-bar{height:100%;border-radius:2px;transition:width .3s}

.accounts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.acc{background:#111;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.acc:hover{border-color:#2a4a06}
.acc.stale{border-color:#3a2a1a}
.acc.stale .acc-head{background:#1a1410}
.acc-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;background:#0f0f0f;border-bottom:1px solid #1a1a1a;gap:10px}
.acc-name{font-size:13px;font-weight:700;color:#fff}
.acc-handle{font-size:11px;color:#555;margin-top:2px}
.acc-stale-tag{display:inline-block;font-size:9px;background:#3a2a1a;color:#ff9100;padding:1px 5px;border-radius:3px;margin-top:4px;font-weight:600;text-transform:uppercase}
.acc-right{text-align:right;flex-shrink:0}
.acc-followers{font-size:20px;font-weight:700;color:#9BFF06;line-height:1}
.acc-follower-label{font-size:9px;color:#444;text-transform:uppercase;margin-top:2px}
.acc-growth{font-size:11px;font-weight:600;margin-top:3px}
.acc-baseline{font-size:10px;color:#555;margin-top:2px}
.acc-stats{display:flex;border-bottom:1px solid #1a1a1a}
.astat{flex:1;padding:8px 6px;text-align:center;border-right:1px solid #1a1a1a}
.astat:last-child{border-right:none}
.astat .n{font-size:15px;font-weight:700;color:#ddd}
.astat .l{font-size:9px;color:#444;text-transform:uppercase;margin-top:2px}
.posts{padding:10px 14px}
.no-posts{padding:10px 14px;font-size:12px;color:#444;font-style:italic}
.post{padding:7px 0;border-bottom:1px solid #181818}
.post:last-child{border-bottom:none}
.post-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.post-date{font-size:10px;background:#1a1a1a;color:#888;padding:2px 7px;border-radius:4px}
.post-nums{font-size:11px;color:#666}
.post-nums .lk{color:#9BFF06}
.post-nums .cm{color:#64b5f6}
.post-cap{font-size:12px;color:#aaa;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tag-cap{color:#888}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:5px;font-weight:600;text-transform:uppercase;vertical-align:middle}
.tag-collab{background:#1a2a3a;color:#64b5f6}
.tag-reel{background:#3a2a1a;color:#ff9100}
.tag-release{background:#1a3a2a;color:#69f0ae}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#141414;border:1px solid #2a2a2a;border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{padding:16px 20px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:15px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;border-top:1px solid #222;display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;color:#e0e0e0;padding:8px 10px;font-size:13px;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#9BFF06}
.row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.post-block{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.post-block-head{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.batch-list{font-family:'SF Mono','Monaco',monospace;font-size:13px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:6px;padding:12px;color:#9BFF06;white-space:pre;line-height:1.6}
.help{font-size:11px;color:#666;margin-top:6px;line-height:1.4}
</style>
</head>

<div class="container">
  <div class="kpi-row" id="kpiRow"></div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Zoek op naam of handle…" />
    <select id="sortSelect">
      <option value="growth_week">Groei deze week</option>
      <option value="growth_total">Totale groei</option>
      <option value="followers">Meeste volgers</option>
      <option value="name">Naam A–Z</option>
      <option value="stale">Verouderd eerst</option>
    </select>
    <button class="btn" onclick="openAddModal()">+ Account</button>
    <button class="btn" onclick="openBatchModal()">Volgende batch</button>
    <button class="btn" onclick="startNewWeek()">Nieuwe week</button>
    <button class="btn" onclick="openImportModal()">Import</button>
    <button class="btn" onclick="exportData()">Export</button>
    <button class="btn" onclick="reloadFromSeed()" title="Herlaad seed data">↻ Reset</button>
  </div>

  <div class="panel">
    <div class="panel-head">
      <span>Groei ranking</span>
    </div>
    <div class="growth-list" id="growthList"></div>
  </div>

  <div class="accounts-grid" id="accountsGrid"></div>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="editTitle">Account</h2>
      <button class="modal-close" onclick="closeModal('editModal')">×</button>
    </div>
    <div class="modal-body" id="editBody"></div>
    <div class="modal-foot">
      <button class="btn danger" id="deleteBtn" onclick="deleteAccount()" style="display:none">Verwijder</button>
      <button class="btn" onclick="closeModal('editModal')">Annuleer</button>
      <button class="btn primary" onclick="saveAccount()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-bg" id="importModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Importeer data</h2>
      <button class="modal-close" onclick="closeModal('importModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>JSON data</label>
        <textarea id="importText" rows="8" placeholder="Plak JSON hier..."></textarea>
        <div class="help">Tip: Exporteer eerst je huidige data als backup voordat je iets importeert.</div>
      </div>
      <div class="field">
        <label>Of laad een bestand</label>
        <input type="file" id="importFile" accept=".json,application/json" onchange="loadFile(event)" />
      </div>

          ]
        }
      ]
    }
  ]
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'rr_smaller_artists_data_v1';

function loadData(){
  const seed = window.SEED_DATA;
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ return JSON.parse(JSON.stringify(seed)); }
  let st;
  try { st = JSON.parse(raw); } catch(e){ console.warn('Stored data corrupt, reseeding'); return JSON.parse(JSON.stringify(seed)); }
  try {
    if(!Array.isArray(st.history)) st.history = [];
    var changed = false;
    // Seed data (freshly built from snapshots.json) is always authoritative for weeks it contains —
    // replace any stale cached copy of that week instead of silently keeping old/wrong data around.
    (seed.history || []).forEach(function(w){
      const key = w.week + '|' + w.date;
      const pos = st.history.findIndex(function(x){ return (x.week + '|' + x.date) === key; });
      if(pos === -1){ st.history.push(JSON.parse(JSON.stringify(w))); changed = true; }
      else if(JSON.stringify(st.history[pos]) !== JSON.stringify(w)){ st.history[pos] = JSON.parse(JSON.stringify(w)); changed = true; }
    });
    if(changed){
      st.history.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
    }
  } catch(e){ console.warn('seed merge failed', e); }
  return st;
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadData();
let idx = 0;
let editingHandle = null;
let search = '';
let sort = 'growth_week';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = n => n == null ? '—' : Math.abs(n) >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'K' : String(n);
const today = () => new Date().toISOString().slice(0,10);

function totals(acc){ return acc.posts.reduce((s,p)=>({l:s.l+(p.likes||0),c:s.c+(p.comments||0)}),{l:0,c:0}); }

function delta(acc){ return acc.prev_followers != null ? acc.followers - acc.prev_followers : null; }
function totalGrowth(acc){ return acc.baseline_followers != null ? acc.followers - acc.baseline_followers : null; }

function deltaSpan(d){
  if(d == null) return '<span class="delta-neu">— nieuw</span>';
  if(d === 0) return '<span class="delta-neu">+0</span>';
  const cls = d > 0 ? 'delta-pos' : 'delta-neg';
  return `<span class="${cls}">${d > 0 ? '+' : ''}${fmt(d)}</span>`;
}

function daysSince(dateStr){
  if(!dateStr) return Infinity;
  const ms = Date.now() - new Date(dateStr).getTime();
  return Math.floor(ms / 86400000);
}

function isStale(acc){ return daysSince(acc.last_updated) > 14; }

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const data = state.history[idx];
  if(!data){ document.getElementById('accountsGrid').innerHTML = '<div style="color:#666">Geen data.</div>'; return; }

  document.getElementById('weekTabs').innerHTML = state.history.map((w,i)=>
    `<button class="week-tab${i===idx?' active':''}" onclick="setIdx(${i})">${escapeHtml(w.week)}</button>`
  ).join('');
  document.getElementById('weekDate').textContent = 'bijgewerkt ' + (data.date || '—');

  const active = data.accounts.filter(a => a.posts && a.posts.length > 0).length;

  const totalDelta = data.accounts.reduce((s,a) => { const d = delta(a); return d != null ? s + d : s; }, 0);
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="v">${active}/${data.accounts.length}</div><div class="l">Actieve accounts</div></div>
    <div class="kpi"><div class="v" style="color:${totalDelta>=0?'#69f0ae':'#ff5252'}">${totalDelta>0?'+':''}${fmt(totalDelta)}</div><div class="l">Groei deze week</div></div>
  `;

  renderGrowthList(data);
  renderAccountsGrid(data);
}

function renderGrowthList(data){
  const sorted = [...data.accounts].sort((a,b)=>{
    const da = delta(a) ?? -Infinity;
    const db = delta(b) ?? -Infinity;
    return db - da;
  });
  const maxAbs = Math.max(1, ...sorted.map(a => Math.abs(delta(a) || 0)));
  document.getElementById('growthList').innerHTML = sorted.map((a,i)=>{
    const d = delta(a);
    const cls = d == null ? 'delta-neu' : d > 0 ? 'delta-pos' : d < 0 ? 'delta-neg' : 'delta-neu';
    const barW = d != null ? Math.round(Math.abs(d) / maxAbs * 100) : 0;
    const barCol = d == null ? '#333' : d > 0 ? '#69f0ae' : d < 0 ? '#ff5252' : '#555';
    return `<div class="growth-row">
      <div class="growth-rank">${i+1}</div>
      <div class="growth-name">@${escapeHtml(a.username)}</div>
      <div class="growth-followers">${fmt(a.followers)}</div>
      <div class="delta-bar-wrap"><div class="delta-bar" style="width:${barW}%;background:${barCol}"></div></div>
      <div class="growth-delta ${cls}">${d == null ? '— nieuw' : (d > 0 ? '+' : '') + fmt(d)}</div>
    </div>`;
  }).join('');
}

function renderAccountsGrid(data){
  const q = search.trim().toLowerCase();
  let list = data.accounts.filter(a =>
    !q || a.username.toLowerCase().includes(q) || (a.name||'').toLowerCase().includes(q)
  );

  list.sort((a,b)=>{
    if(sort === 'name') return (a.name||a.username).localeCompare(b.name||b.username);
    if(sort === 'followers') return b.followers - a.followers;
    if(sort === 'growth_total'){ const ta = totalGrowth(a) ?? -Infinity, tb = totalGrowth(b) ?? -Infinity; return tb - ta; }
    if(sort === 'stale') return daysSince(b.last_updated) - daysSince(a.last_updated);
    const da = delta(a) ?? -Infinity, db = delta(b) ?? -Infinity;
    return db - da;
  });

  document.getElementById('accountsGrid').innerHTML = list.map(a => accountCard(a)).join('');
}

function accountCard(a){
  const t = totals(a);
  const d = delta(a);
  const tg = totalGrowth(a);
  const growthCls = d == null ? 'delta-neu' : d > 0 ? 'delta-pos' : d < 0 ? 'delta-neg' : 'delta-neu';
  const growthStr = d == null ? '' : ((d > 0 ? '↑ +' : d < 0 ? '↓ ' : '') + fmt(d) + ' vs vorige week');
  const baselineStr = a.baseline_followers != null
    ? `start: ${fmt(a.baseline_followers)}${tg != null ? ` (${tg >= 0 ? '+' : ''}${fmt(tg)})` : ''}`
    : '';
  const stale = isStale(a);

  const postsHtml = !a.posts || a.posts.length === 0
    ? '<div class="no-posts">Geen posts deze week</div>'
    : `<div class="posts">${a.posts.map(p => `
        <div class="post">
          <div class="post-top">
            <span class="post-date">${escapeHtml(p.date)}</span>
            <span class="post-nums"><span class="lk">♥ ${fmt(p.likes)}</span> &nbsp;<span class="cm">💬 ${fmt(p.comments)}</span></span>
          </div>
          <div class="post-cap ${p.type && p.type !== 'normal' ? 'tag-cap' : ''}">
            ${tagBadge(p.type)}${escapeHtml((p.caption||'').substring(0, 110))}
          </div>
        </div>`).join('')}
      </div>`;

  return `<div class="acc${stale ? ' stale' : ''}" onclick="openEditModal('${escapeHtml(a.username)}')">
    <div class="acc-head">
      <div>
        <div class="acc-name">${escapeHtml(a.name || a.username)}</div>
        <div class="acc-handle">@${escapeHtml(a.username)}</div>
        ${stale ? '<div class="acc-stale-tag">stale</div>' : ''}
      </div>
      <div class="acc-right">
        <div class="acc-followers">${fmt(a.followers)}</div>
        <div class="acc-follower-label">volgers</div>
        ${d != null ? `<div class="acc-growth ${growthCls}">${growthStr}</div>` : ''}
        ${baselineStr ? `<div class="acc-baseline">${baselineStr}</div>` : ''}
      </div>
    </div>
    <div class="acc-stats">
      <div class="astat"><div class="n">${(a.posts||[]).length}</div><div class="l">posts</div></div>
      <div class="astat"><div class="n">${fmt(t.l)}</div><div class="l">likes</div></div>
      <div class="astat"><div class="n">${fmt(t.c)}</div><div class="l">comments</div></div>
    </div>
    ${postsHtml}
  </div>`;
}

function tagBadge(type){
  if(!type || type === 'normal') return '';
  return `<span class="tag tag-${type}">${type}</span>`;
}

// ─── EDIT MODAL ──────────────────────────────────────────────────────────────
function openAddModal(){
  editingHandle = null;
  document.getElementById('editTitle').textContent = 'Nieuw account';
  document.getElementById('deleteBtn').style.display = 'none';
  renderEditForm({ username:'', name:'', followers:0, baseline_followers:null, posts:[null,null,null] });
  document.getElementById('editModal').classList.add('show');
}

function openEditModal(handle){
  const data = state.history[idx];
  const acc = data.accounts.find(a => a.username === handle);
  if(!acc) return;
  editingHandle = handle;
  document.getElementById('editTitle').textContent = '@' + handle;
  document.getElementById('deleteBtn').style.display = '';
  const posts = [...(acc.posts || [])];
  while(posts.length < 3) posts.push(null);
  renderEditForm({ ...acc, posts: posts.slice(0,3) });
  document.getElementById('editModal').classList.add('show');
}

function renderEditForm(acc){
  document.getElementById('editBody').innerHTML = `
    <div class="row" style="grid-template-columns:1fr 1fr">
      <div class="field">
        <label>Instagram handle</label>
        <input type="text" id="f_username" value="${escapeHtml(acc.username)}" placeholder="zonder @" />
      </div>
      <div class="field">
        <label>Artiest naam</label>
        <input type="text" id="f_name" value="${escapeHtml(acc.name)}" />
      </div>
    </div>
    <div class="row" style="grid-template-columns:1fr 1fr">
      <div class="field">
        <label>Volgers (nu)</label>
        <input type="number" id="f_followers" value="${acc.followers || 0}" />
      </div>
      <div class="field">
        <label>Volgers basis</label>
        <input type="number" id="f_baseline" value="${acc.baseline_followers ?? ''}" placeholder="optioneel" />
      </div>
    </div>
    ${[0,1,2].map(i => postFormBlock(i, acc.posts[i])).join('')}
  `;
}

function postFormBlock(i, p){
  p = p || { date:'', caption:'', likes:0, comments:0, type:'normal' };
  return `<div class="post-block">
    <div class="post-block-head">Post ${i+1}</div>
    <div class="row" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="field" style="margin-bottom:8px">
        <label>Datum</label>
        <input type="text" id="p${i}_date" value="${escapeHtml(p.date)}" placeholder="22 mei" />
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Likes</label>
        <input type="number" id="p${i}_likes" value="${p.likes || 0}" />
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Comments</label>
        <input type="number" id="p${i}_comments" value="${p.comments || 0}" />
      </div>
      <div class="field" style="margin-bottom:8px">
        <label>Type</label>
        <select id="p${i}_type">
          <option value="normal">${(p.type||'normal')==='normal'?' selected':''}>normal</option>
          <option value="collab">${p.type==='collab'?' selected':''}>collab</option>
          <option value="reel">${p.type==='reel'?' selected':''}>reel</option>
          <option value="release">${p.type==='release'?' selected':''}>release</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Caption</label>
      <textarea id="p${i}_caption" rows="2">${escapeHtml(p.caption)}</textarea>
    </div>
  </div>`;
}

function saveAccount(){
  const username = document.getElementById('f_username').value.trim().replace(/^@/, '');
  if(!username){ alert('Handle is verplicht'); return; }
  const name = document.getElementById('f_name').value.trim() || username;
  const followers = parseInt(document.getElementById('f_followers').value) || 0;
  const baselineRaw = document.getElementById('f_baseline').value.trim();
  const baseline_followers = baselineRaw === '' ? followers : parseInt(baselineRaw);

  const posts = [];
  for(let i = 0; i < 3; i++){
    const date = document.getElementById(`p${i}_date`).value.trim();
    const caption = document.getElementById(`p${i}_caption`).value.trim();
    const likes = parseInt(document.getElementById(`p${i}_likes`).value) || 0;
    const comments = parseInt(document.getElementById(`p${i}_comments`).value) || 0;
    const type = document.getElementById(`p${i}_type`).value;
    if(date || caption) posts.push({ date, caption, likes, comments, type });
  }

  const data = state.history[idx];
  if(editingHandle){
    const i = data.accounts.findIndex(a => a.username === editingHandle);
    if(i >= 0){
      const prev = data.accounts[i];
      data.accounts[i] = {
        ...prev,
        username, name, followers,
        baseline_followers: prev.baseline_followers ?? baseline_followers,
        posts,
        last_updated: today()
      };
    }
  } else {
    if(data.accounts.some(a => a.username === username)){ alert('Handle bestaat al'); return; }
    data.accounts.push({
      username, name, followers,
      baseline_followers,
      prev_followers: null,
      last_updated: today(),
      posts
    });
  }

  saveData();
  closeModal('editModal');
  render();
}

function deleteAccount(){
  if(!editingHandle) return;
  if(!confirm(`Verwijder @${editingHandle} uit deze week?`)) return;
  const data = state.history[idx];
  data.accounts = data.accounts.filter(a => a.username !== editingHandle);
  saveData();
  closeModal('editModal');
  render();
}

// ─── NEW WEEK ────────────────────────────────────────────────────────────────
function startNewWeek(){
  if(!state.history.length){ alert('Geen vorige week om te clonen.'); return; }
  const current = state.history[0];
  const m = /Week\s+(\d+)/i.exec(current.week);
  const newWeekNum = m ? (parseInt(m[1]) + 1) : (state.history.length + 1);
  if(!confirm(`Start Week ${newWeekNum}? Posts worden geleegd, volgers tellingen gecloned.`)) return;
  const cloned = {
    week: `Week ${newWeekNum}`,
    date: today(),
    accounts: current.accounts.map(a => ({
      username: a.username,
      name: a.name,
      followers: a.followers,
      baseline_followers: a.baseline_followers ?? a.followers,
      prev_followers: a.followers,
      last_updated: null,
      posts: []
    }))
  };
  state.history.unshift(cloned);
  idx = 0;
  saveData();
  render();
}

// ─── BATCH MODAL ─────────────────────────────────────────────────────────────
function openBatchModal(){
  renderBatch();
  document.getElementById('batchModal').classList.add('show');
}

function renderBatch(){
  const size = parseInt(document.getElementById('batchSize').value) || 10;
  const data = state.history[idx];
  const stale = [...data.accounts].sort((a,b) => daysSince(b.last_updated) - daysSince(a.last_updated)).slice(0, size);
  document.getElementById('batchList').textContent = stale.map(a => '@' + a.username).join('\n');
}

function copyBatch(){
  const text = document.getElementById('batchList').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ Gekopieerd';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ─── IMPORT / EXPORT ─────────────────────────────────────────────────────────
function openImportModal(){
  document.getElementById('importText').value = '';
  document.getElementById('importModal').classList.add('show');
}

function loadFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ev => document.getElementById('importText').value = ev.target.result;
  r.readAsText(file);
}

function importData(){
  const text = document.getElementById('importText').value.trim();
  if(!text){ alert('Niets te importeren'); return; }
  let parsed;
  try { parsed = JSON.parse(text); } catch(e){ alert('Ongeldige JSON: ' + e.message); return; }
  if(!parsed.history || !Array.isArray(parsed.history)){ alert('JSON mist "history" array'); return; }
  if(!confirm('Huidige data overschrijven met geïmporteerde data?')) return;
  state = parsed;
  idx = 0;
  saveData();
  closeModal('importModal');
  render();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rr-headlines-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function reloadFromSeed(){
  if(!confirm('Reset naar seed data? Alle lokale wijzigingen worden gewist.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = JSON.parse(JSON.stringify(window.SEED_DATA));
  idx = 0;
  render();
}

// ─── MISC ────────────────────────────────────────────────────────────────────
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function setIdx(i){ idx = i; render(); }

document.getElementById('searchInput').addEventListener('input', e => {
  search = e.target.value;
  renderAccountsGrid(state.history[idx]);
});
document.getElementById('sortSelect').addEventListener('change', e => {
  sort = e.target.value;
  renderAccountsGrid(state.history[idx]);
});

document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target === bg) bg.classList.remove('show'); });
});

render();
</script>
